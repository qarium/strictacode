name: Open New Version

on:
  workflow_dispatch:
    inputs:
      type:
        description: "New version type"
        required: true
        type: choice
        options: [minor, major]

permissions:
  contents: write

jobs:
  create_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check default branch
        run: |
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "ERROR: New versions can only be created from the default branch."
            echo "Current: ${{ github.ref_name }}, Default: ${{ github.event.repository.default_branch }}"
            echo "Use 'Publish Release' workflow for patch releases."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate branch name
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # If on a version branch (X.Y.x), extract version from branch name
          if [[ "$BRANCH" =~ ^([0-9]+)\.([0-9]+)\.x$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            echo "Current branch: $BRANCH → MAJOR=$MAJOR MINOR=$MINOR"
          else
            # On main or other branch — use latest tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            echo "Current branch: $BRANCH, latest tag: $LATEST_TAG → MAJOR=$MAJOR MINOR=$MINOR"
          fi

          if [ "${{ inputs.type }}" == "major" ]; then
            NEW_BRANCH="$((MAJOR + 1)).0.x"
          else
            NEW_BRANCH="$MAJOR.$((MINOR + 1)).x"
          fi

          echo "new_branch=$NEW_BRANCH" >> "$GITHUB_OUTPUT"
          echo "New branch: $NEW_BRANCH"

      - name: Create branch and set default
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          NEW_BRANCH="${{ steps.meta.outputs.new_branch }}"

          # Check if branch already exists
          if git ls-remote --heads origin "$NEW_BRANCH" | grep -q "$NEW_BRANCH"; then
            echo "ERROR: Branch '$NEW_BRANCH' already exists."
            echo "Switch to it and use 'Publish Release' workflow instead."
            exit 1
          fi

          git checkout -b "$NEW_BRANCH"
          git push origin "$NEW_BRANCH"

          gh api -X PATCH /repos/${{ github.repository }} \
            -f default_branch="$NEW_BRANCH"

          echo "Created branch $NEW_BRANCH and set it as default"
