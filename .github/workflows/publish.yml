name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Calculate next version
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # Validate branch name matches X.Y.x pattern
          if [[ ! "$BRANCH" =~ ^[0-9]+\.[0-9]+\.x$ ]]; then
            echo "ERROR: Branch '$BRANCH' does not match X.Y.x pattern."
            echo "Use 'Open New Version' workflow to create a version branch first."
            exit 1
          fi

          VERSION_PREFIX="${BRANCH%.x}"

          # Find latest tag in this series
          LATEST_TAG=$(git tag -l "v${VERSION_PREFIX}.*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v${VERSION_PREFIX}.0"
            # First release in series — diff against latest overall tag
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          else
            IFS='.' read -r MA MI PA <<< "${LATEST_TAG#v}"
            NEW_TAG="v$MA.$MI.$((PA + 1))"
            PREV_TAG="$LATEST_TAG"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG:-}" >> "$GITHUB_OUTPUT"
          echo "Version: $NEW_TAG (prev: ${PREV_TAG:-none})"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure Claude Code for z.ai
        run: |
          mkdir -p ~/.claude
          cat > ~/.claude/settings.json << 'SETTINGS'
          {
            "env": {
              "ANTHROPIC_DEFAULT_HAIKU_MODEL": "glm-4.7",
              "ANTHROPIC_DEFAULT_SONNET_MODEL": "glm-5.1",
              "ANTHROPIC_DEFAULT_OPUS_MODEL": "glm-5.1"
            }
          }
          SETTINGS

      - name: Generate Release Notes
        id: notes
        if: steps.meta.outputs.prev_tag != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ZAI_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
          PREV_TAG: ${{ steps.meta.outputs.prev_tag }}
          NEW_TAG: ${{ steps.meta.outputs.new_tag }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Save diff to files (only package source)
          git diff --stat "$PREV_TAG" HEAD -- strictacode/ > /tmp/diff_stat.txt
          git diff "$PREV_TAG" HEAD -- strictacode/ > /tmp/diff.txt

          # Truncate diff if needed
          if [ "$(wc -c < /tmp/diff.txt)" -gt 8000 ]; then
            head -c 8000 /tmp/diff.txt > /tmp/diff_trimmed.txt
            printf '\n... (diff truncated)' >> /tmp/diff_trimmed.txt
            mv /tmp/diff_trimmed.txt /tmp/diff.txt
          fi

          # Check empty diff
          if [ ! -s /tmp/diff.txt ]; then
            echo "No diff found, skipping release notes generation"
            echo "Release $NEW_TAG" > release_notes.md
            exit 0
          fi

          # Build prompt file
          python3 -c "
          import os
          new_tag = os.environ['NEW_TAG']
          repo = os.environ.get('REPO_NAME', 'project')
          with open('/tmp/diff_stat.txt') as f: stat = f.read()
          with open('/tmp/diff.txt') as f: diff = f.read()
          prompt = f'''You are a DevOps engineer for the {repo} project. Based on the code diff between releases, generate Release Notes in English.

          Format (strictly follow):
          ## What is new in {new_tag}

          ### Added
          - description of new features

          ### Fixed
          - description of bug fixes

          ### Changed
          - description of behavior changes

          Rules:
          - Analyze the ACTUAL code in the diff, not just commit messages
          - Describe each change in a single line, concise and technically accurate
          - Maximum 3 items per section, only the most important changes
          - If a section is empty - do not include it
          - Do not add sections not present in the template
          - Do not write introductory text, start directly with the heading

          Diff stats:
          {stat}

          Diff:
          {diff}'''
          with open('/tmp/prompt.txt', 'w') as f: f.write(prompt)
          "

          # Run claude-code
          npx @anthropic-ai/claude-code -p "$(cat /tmp/prompt.txt)" \
            --model glm-5.1 \
            --output-format text \
            --dangerously-skip-permissions \
            > release_notes.md

          echo "Release notes generated ($(wc -c < release_notes.md) bytes)"

      - name: Create tag and build
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          pip install build
          python -m build
          git tag "${{ steps.meta.outputs.new_tag }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true

      - name: Push tag and create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ steps.meta.outputs.new_tag }}"

          # Latest only if releasing from default branch
          IS_DEFAULT="${{ github.ref_name == github.event.repository.default_branch }}"
          if [ "$IS_DEFAULT" = "true" ]; then
            LATEST_FLAG="--latest"
          else
            LATEST_FLAG="--latest=false"
          fi

          if [ -f release_notes.md ]; then
            gh release create "${{ steps.meta.outputs.new_tag }}" \
              --title "Release ${{ steps.meta.outputs.new_tag }}" \
              --notes-file release_notes.md \
              $LATEST_FLAG \
              ./dist/*
          else
            gh release create "${{ steps.meta.outputs.new_tag }}" \
              --title "Release ${{ steps.meta.outputs.new_tag }}" \
              --notes "Release ${{ steps.meta.outputs.new_tag }}" \
              $LATEST_FLAG \
              ./dist/*
          fi